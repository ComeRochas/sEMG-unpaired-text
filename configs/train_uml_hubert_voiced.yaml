# scripts/train_uml.py — HuBERT-unit CTC targets, SILENT-TARGET-FIXED (phase-2 alt unit).
# Differs from train_uml_hubert.yaml in ONE thing: targets read from data/hubert_units_voiced,
# where SILENT samples target their parallel VOICED audio (spoken content) instead of their own
# near-silent mic (whose km100 units were degenerate noise). dev/test are 100% silent, so this is
# what makes the dev metric meaningful. Still a baseline (lambda_uml=0); the audio second branch
# is inert. CLI flags override these.

cache_dir: /scratch/cr4206/sEMG-unpaired-text/data
librispeech_cache_dir: /scratch/cr4206/sEMG-unpaired-text/data/libri_cache
librispeech_split: train-clean-100
output_directory: /scratch/cr4206/sEMG-unpaired-text/runs/uml_hubert_voiced

# --- HuBERT-unit target: silent -> voiced-parallel audio (precompute --silent-target voiced) ---
unit: hubert
hubert_k: 100
hubert_units_dir: /scratch/cr4206/sEMG-unpaired-text/data/hubert_units_voiced
downsample_factor: 8

# §3 diagnostic: hold 250 voiced utterances out of train and eval them as a 2nd dev ("vdev" =
# voiced EMG -> own clean units). Separates silent-speech difficulty from (ex-)target degeneracy.
voiced_eval_ids: /scratch/cr4206/sEMG-unpaired-text/data/hubert_units_voiced/voiced_eval_ids.txt

epochs: 200
max_batch_len: 88000
fixed_raw_len: 1600
audio_batch_size: 8
audio_num_workers: 2

learning_rate: 3.0e-4
learning_rate_warmup: 1000
l2: 0.0
grad_accum_steps: 2
lr_decay_milestones: [125, 150, 175]
lr_decay_gamma: 0.5
clip_grad_norm: 1.0

# Pure baseline: the auxiliary branch contributes nothing (loss * 0).
second_branch: audio
lambda_uml: 0.0

share_ctc_head: false
epoch_mode: alternate

model_size: 768
num_layers: 6
dropout: 0.2

start_training_from: null

# Units have no word LM -> greedy; dev_wer = UNIT error rate, vdev_wer = voiced UER.
eval_method: greedy

wandb: false
wandb_entity: UMLforVideoLab
wandb_project: JEPAforsEMG
wandb_run_name: null
wandb_tags: [uml, hubert, voiced_target]
