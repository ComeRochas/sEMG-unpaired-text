# Defaults for scripts/train_uml.py with HuBERT-unit CTC targets (phase-2 alt unit).
# Baseline-as-UML-with-lambda=0: the EMG branch predicts HuBERT km100 units; the audio
# second branch is inert (lambda_uml=0) but kept so the architecture matches the UML runs.
# CLI flags override these.

cache_dir: /scratch/cr4206/sEMG-unpaired-text/data
librispeech_cache_dir: /scratch/cr4206/sEMG-unpaired-text/data/libri_cache
librispeech_split: train-clean-100
output_directory: /scratch/cr4206/sEMG-unpaired-text/runs/uml_hubert

# --- HuBERT-unit target (audio-derived; precompute with scripts/precompute_hubert_units.py) ---
unit: hubert
hubert_k: 100
hubert_units_dir: /scratch/cr4206/sEMG-unpaired-text/data/hubert_units
# Units (~30 deduped/s) are a denser target than chars, so EMG wants a finer rate than the
# char 16x: 8x (~86 frames/s) keeps a comfortable CTC margin. Sweep 8x/10x if needed.
downsample_factor: 8

epochs: 200
max_batch_len: 88000
fixed_raw_len: 1600
audio_batch_size: 8
audio_num_workers: 2

learning_rate: 3.0e-4
learning_rate_warmup: 1000
l2: 0.0
grad_accum_steps: 2
lr_decay_milestones: [125, 150, 175]
lr_decay_gamma: 0.5
clip_grad_norm: 1.0

# Pure baseline: the auxiliary branch contributes nothing (loss * 0).
second_branch: audio
lambda_uml: 0.0

share_ctc_head: false
epoch_mode: alternate

model_size: 768
num_layers: 6
dropout: 0.2

start_training_from: null

# Units have no word LM -> train_uml.py forces greedy; the dev metric is a UNIT error rate.
# The real word-WER comes from scripts/eval_hubert_resynth.py (re-synthesis + ASR).
eval_method: greedy

wandb: false
wandb_entity: UMLforVideoLab
wandb_project: JEPAforsEMG
wandb_run_name: null
wandb_tags: [uml, hubert]
