# Multi-auxiliary UML with a STRONGER frozen text encoder (ByT5-small, byte-level, ~300M vs
# CANINE-s ~120M). Same as train_uml_multiaux.yaml except the text branch's frozen encoder.
# Paper lesson (arXiv:2510.08492 E.2): a stronger/aligned frozen text encoder -> bigger UML gains.
# Compare against the CANINE multi-aux arm (same seed) to isolate the text-encoder effect.

cache_dir: /scratch/cr4206/sEMG-unpaired-text/data

# --- audio auxiliary (Gaddy-internal) ---
librispeech_cache_dir: /scratch/cr4206/sEMG-unpaired-text/data/gaddy_audio_cache
librispeech_split: gaddy_internal
audio_batch_size: 8
audio_num_workers: 2

# --- text auxiliary (LibriSpeech corpus, FROZEN ByT5) ---
text_cache_dir: /scratch/cr4206/sEMG-unpaired-text/data/text_cache
text_source: libri
text_frontend: frozen
text_frozen_arch: byt5
text_frozen_model: google/byt5-small
text_batch_size: 8
text_num_workers: 2
text_p_mask: 0.15
text_p_sub: 0.10
text_p_del: 0.05
text_upsample: 3
text_jitter: 1

# --- multi-aux wiring ---
aux_branches: [audio, text]
lambda_audio: 0.3
lambda_text: 0.3

output_directory: /scratch/cr4206/sEMG-unpaired-text/runs/uml_multiaux_byt5

# --- EMG target: char @ 16x (decided phase-2 config) ---
unit: char
downsample_factor: 16

epochs: 200
max_batch_len: 88000
fixed_raw_len: 1600

learning_rate: 3.0e-4
learning_rate_warmup: 1000
l2: 0.0
grad_accum_steps: 2
lr_decay_milestones: [125, 150, 175]
lr_decay_gamma: 0.5
clip_grad_norm: 0.0

share_ctc_head: false
epoch_mode: alternate

model_size: 768
num_layers: 6
dropout: 0.2

start_training_from: null
eval_method: beam

wandb: false
wandb_entity: UMLforVideoLab
wandb_project: JEPAforsEMG
wandb_run_name: null
wandb_tags: [uml, multiaux, char16x, byt5]
